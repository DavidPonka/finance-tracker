<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анализ Транзакций</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .modal { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body class="bg-gray-50 font-sans">

<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="modal bg-white rounded-3xl shadow-2xl max-w-lg w-full mx-4 overflow-hidden">
    <div id="modalHeader" class="px-6 py-4 border-b font-semibold text-lg"></div>
    <div id="modalBody" class="px-6 py-6 text-gray-700"></div>
    <div id="modalFooter" class="px-6 py-4 border-t flex justify-end gap-3"></div>
  </div>
</div>

<div class="max-w-7xl mx-auto p-6">
  <h1 class="text-4xl font-bold text-gray-800 mb-8 flex items-center gap-3">
    <i class="fas fa-wallet text-blue-600"></i> Анализ моих финансов
  </h1>

  <!-- Загрузка CSV -->
  <div class="bg-white rounded-2xl shadow p-6 mb-8">
    <h2 class="text-2xl font-semibold mb-4">Загрузить выписку из банка</h2>
    <input type="file" id="csvFile" accept=".csv"
           class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-medium file:bg-blue-600 file:text-white hover:file:bg-blue-700">
  </div>

  <!-- Ручное добавление -->
  <div class="bg-white rounded-2xl shadow p-6 mb-8">
    <h2 class="text-xl font-semibold mb-4">Добавить транзакцию вручную</h2>
    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
      <div><label class="block text-sm text-gray-600 mb-1">Дата</label><input id="dateInput" type="date" class="w-full px-4 py-3 border rounded-xl"></div>
      <div><label class="block text-sm text-gray-600 mb-1">Описание</label><input id="descInput" type="text" placeholder="Можно оставить пустым" class="w-full px-4 py-3 border rounded-xl"></div>
      <div><label class="block text-sm text-gray-600 mb-1">Счёт / Получатель</label><input id="accountInput" type="text" placeholder="Оксана К. или T2" class="w-full px-4 py-3 border rounded-xl"></div>
      <div><label class="block text-sm text-gray-600 mb-1">Сумма</label><input id="amountInput" type="number" step="0.01" placeholder="125000 или -3500" class="w-full px-4 py-3 border rounded-xl"></div>
      <div><label class="block text-sm text-gray-600 mb-1">Категория</label><input id="catInput" type="text" placeholder="Продукты" class="w-full px-4 py-3 border rounded-xl"></div>
    </div>
    <button onclick="addTransaction()" class="mt-6 px-8 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-medium flex items-center gap-2">
      <i class="fas fa-plus"></i> Добавить транзакцию
    </button>
  </div>

  <!-- Карточки, фильтры, таблица, графики — без изменений -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10" id="summaryCards"></div>

  <div class="bg-white rounded-2xl shadow p-6 mb-8 flex flex-wrap gap-4 items-end">
    <input id="search" placeholder="Поиск по описанию или счёту..."
           class="flex-1 min-w-[250px] px-4 py-3 border rounded-xl focus:outline-none focus:border-blue-500">
    <select id="categoryFilter" class="px-4 py-3 border rounded-xl"></select>
    <select id="monthFilter" class="px-4 py-3 border rounded-xl"></select>
    <button onclick="resetFilters()" class="px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-xl">Сбросить фильтры</button>
  </div>

  <div class="bg-white rounded-2xl shadow overflow-hidden mb-10">
    <table class="w-full">
      <thead class="bg-gray-100">
        <tr>
          <th class="px-6 py-4 text-left">Дата</th>
          <th class="px-6 py-4 text-left">Описание</th>
          <th class="px-6 py-4 text-left">Счёт / Получатель</th>
          <th class="px-6 py-4 text-left">Категория</th>
          <th class="px-6 py-4 text-right">Сумма</th>
          <th class="px-6 py-4 text-right">Остаток</th>
          <th class="px-6 py-4 text-center w-20">Действия</th>
        </tr>
      </thead>
      <tbody id="tableBody" class="divide-y"></tbody>
    </table>
  </div>

  <div class="flex justify-center mb-10">
    <button id="loadMoreBtn" onclick="loadMore()" class="hidden px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium">
      Показать ещё 15 операций
    </button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
    <div class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-xl font-semibold mb-4">Расходы по категориям</h2>
      <canvas id="pieChart" height="320"></canvas>
    </div>
    <div class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-xl font-semibold mb-4">Приход / Расход по месяцам</h2>
      <canvas id="barChart" height="320"></canvas>
    </div>
  </div>

  <!-- Кнопки JSON -->
  <div class="flex justify-center gap-4 mb-8">
    <button onclick="exportData()"
            class="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-medium flex items-center gap-3 shadow-lg">
      <i class="fas fa-download"></i> Экспорт данных в JSON
    </button>
    <button onclick="importData()"
            class="px-8 py-4 bg-purple-600 hover:bg-purple-700 text-white rounded-2xl font-medium flex items-center gap-3 shadow-lg">
      <i class="fas fa-upload"></i> Импорт данных из JSON
    </button>
  </div>
</div>

<script>
// ==================== МОДАЛЬНЫЕ ОКНА ====================
let currentResolve = null;
function showModal(title, message, buttons) {
  return new Promise(resolve => {
    currentResolve = resolve;
    document.getElementById('modalHeader').textContent = title;
    document.getElementById('modalBody').innerHTML = message;
    const footer = document.getElementById('modalFooter');
    footer.innerHTML = '';
    buttons.forEach(btn => {
      const button = document.createElement('button');
      button.textContent = btn.text;
      button.className = `px-6 py-3 rounded-2xl font-medium ${btn.style}`;
      button.onclick = () => { closeModal(); resolve(btn.value); };
      footer.appendChild(button);
    });
    document.getElementById('modal').classList.remove('hidden');
  });
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function showAlert(message) { return showModal("Уведомление", `<p class="text-lg">${message}</p>`, [{ text: "OK", style: "bg-blue-600 text-white", value: true }]); }
function showConfirm(message) {
  return showModal("Подтверждение", `<p class="text-lg">${message}</p>`, [
    { text: "Отмена", style: "bg-gray-200", value: false },
    { text: "ОК", style: "bg-red-600 text-white", value: true }
  ]);
}

// ==================== ПЕРЕМЕННЫЕ ====================
let transactions = [];
let filteredTransactions = [];
const ROWS_PER_PAGE = 15;
let currentPage = 1;
let pieChartInstance = null;
let barChartInstance = null;
const STORAGE_KEY = 'myFinanceTransactions';
let currentCategoryFilter = '';
let currentMonthFilter = '';

// ==================== СОРТИРОВКА ====================
function sortTransactions() {
  transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
}

function loadSavedData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    transactions = JSON.parse(saved);
    sortTransactions();
    filteredTransactions = [...transactions];
  }
  renderAll();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
}

// ==================== УЛУЧШЕННЫЙ ИМПОРТ JSON ====================
function exportData() {
  if (transactions.length === 0) {
    return showAlert('Нет данных для экспорта');
  }
  const dataStr = JSON.stringify(transactions, null, 2);
  const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
  const linkElement = document.createElement('a');
  linkElement.setAttribute('href', dataUri);
  linkElement.setAttribute('download', 'my_finance_transactions.json');
  linkElement.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function(event) {
      let text = event.target.result;

      try {
        // Убираем BOM и лишние пробелы — частая причина ошибки
        text = text.trim().replace(/^\uFEFF/, '');

        const imported = JSON.parse(text);

        if (!Array.isArray(imported)) {
          throw new Error("Файл должен содержать массив транзакций []");
        }

        const replace = await showConfirm(`Найдено ${imported.length} операций.<br><br>Заменить все данные или добавить к существующим?`);
        
        if (replace) {
          transactions = imported;
        } else {
          transactions = [...transactions, ...imported];
        }

        sortTransactions();
        saveData();
        filteredTransactions = [...transactions];
        currentPage = 1;
        currentCategoryFilter = '';
        currentMonthFilter = '';
        renderAll();

        await showAlert(`✅ Успешно ${replace ? 'заменено' : 'добавлено'} ${imported.length} операций!`);

      } catch (err) {
        console.error("JSON parse error:", err);
        await showAlert(`Ошибка при чтении JSON:<br><br>${err.message}<br><br>Проверьте, что файл сохранён в кодировке UTF-8 и не содержит ошибок формата.`);
      }
    };
    reader.readAsText(file, 'utf-8');   // явно указываем UTF-8
  };
  input.click();
}

// ==================== Остальной код (CSV, addTransaction, edit, delete, render и т.д.) ====================
// (оставлен без изменений из твоего кода)

document.getElementById('csvFile').addEventListener('change', function(e) { /* твой код CSV */ });

function addTransaction() { /* твой код */ }

async function editTransaction(id) { /* твой код */ }

function deleteTransaction(id) { /* твой код */ }

function renderTable() { /* твой код */ }

function renderAll() { /* твой код */ }

// ... (все остальные функции renderSummaryCards, renderPieChart и т.д.)

// ==================== Обработчики ====================
document.getElementById('search').oninput = filterData;
document.getElementById('categoryFilter').onchange = filterData;
document.getElementById('monthFilter').onchange = filterData;

loadSavedData();
</script>
</body>
</html>
